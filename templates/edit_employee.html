{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h2 class="mb-4">Edit Employee</h2>
        <form method="post">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" name="full_name" value="{{ employee.full_name }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Role</label>
                    <input type="text" class="form-control" name="role" value="{{ employee.role }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Department</label>
                    <input type="text" class="form-control" name="department" value="{{ employee.department }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" name="email" value="{{ employee.email }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Phone</label>
                    <input type="text" class="form-control" name="phone" value="{{ employee.phone }}" required>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Update Employee</button>
                    <a class="btn btn-secondary" href="{{ url_for('dashboard') }}">Cancel</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
